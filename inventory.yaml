---
raspberry:
  hosts:
    raspberry-1.local:
      vm_builder_apiserver_version: v1.2.0
      vm_builder_apiserver_hosts:
        - name: nvidia-1
          url: https://nvidia-1.local:8443
        - name: sparkle-1
          url: https://sparkle-1.local:8443
      wakelet_version: v1.3.1
      wakelet_ups:
        - nut_name: apc
          display_name: APC SMC1500
      wakelet_hosts:
        - name: console-1.local
          mac: 00:ce:39:d3:7f:69
          holdup_timer: 25
        - name: nvidia-1.local
          mac: a8:a1:59:7d:7c:81
          holdup_timer: 30
        - name: sparkle-1.local
          mac: 9c:6b:00:68:42:ab
          holdup_timer: 120
  vars:
    ansible_user: ubuntu
