---
# ── Binary ────────────────────────────────────────────────────────────────

- name: Install vm-builder-apiserver binary
  ansible.builtin.get_url:
    url: "https://github.com/tlhakhan/vm-builder-apiserver/releases/download/{{ vm_builder_apiserver_version }}/vm-builder-apiserver-linux-{{ vm_builder_apiserver_arch_map[ansible_facts['architecture']] }}"
    dest: "{{ vm_builder_apiserver_binary }}"
    owner: root
    group: root
    mode: "0755"
  notify: Restart vm-builder-apiserver

# ── Directories ───────────────────────────────────────────────────────────

- name: Create vm-builder-apiserver private directory
  ansible.builtin.file:
    path: "{{ vm_builder_apiserver_private_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Create vm-builder-apiserver registry directory
  ansible.builtin.file:
    path: "{{ vm_builder_apiserver_registry_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

# ── Configuration ─────────────────────────────────────────────────────────

- name: Deploy registry.json
  ansible.builtin.template:
    src: registry.json.j2
    dest: "{{ vm_builder_apiserver_registry_dir }}/registry.json"
    owner: root
    group: root
    mode: "0640"
  notify: Restart vm-builder-apiserver

# ── Systemd service ───────────────────────────────────────────────────────

- name: Deploy vm-builder-apiserver systemd service unit
  ansible.builtin.template:
    src: vm-builder-apiserver.service.j2
    dest: /etc/systemd/system/vm-builder-apiserver.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart vm-builder-apiserver

- name: Enable and start vm-builder-apiserver
  ansible.builtin.systemd:
    name: vm-builder-apiserver
    enabled: true
    state: started
    daemon_reload: true
