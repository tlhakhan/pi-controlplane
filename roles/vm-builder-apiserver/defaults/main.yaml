---
vm_builder_apiserver_version: v1.2.0
vm_builder_apiserver_arch_map:
  aarch64: arm64
  armv7l: arm
  x86_64: amd64

vm_builder_apiserver_binary: /usr/local/bin/vm-builder-apiserver
vm_builder_apiserver_listen: ":8080"
vm_builder_apiserver_private_dir: /etc/vm-builder-apiserver/private
vm_builder_apiserver_registry_dir: /var/lib/vm-builder-apiserver
vm_builder_apiserver_health_interval: 10s
vm_builder_apiserver_agent_mtls: true
vm_builder_apiserver_agent_insecure_skip_verify: true

# List of agent hosts to register in registry.json.
# Each entry requires name and url.
#
# Example:
# vm_builder_apiserver_hosts:
#   - name: hypervisor-1
#     url: https://hypervisor-1.local:8443
vm_builder_apiserver_hosts: []
